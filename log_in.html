<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Time Tracker</title>
    
    <link href="./output.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen text-gray-800">

    <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                
                <div class="flex items-center gap-2 cursor-pointer">
                    <a href="index.html" class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition duration-200">
                       <img src="\src\timer.png" alt="TimeTracker" class="w-8 h-8 object-contain">
                        <span class="font-bold text-xl text-gray-900">TimeTracker</span>
                    </a>
                </div>

                <nav class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-500 hover:text-gray-900 font-medium transition duration-200">Main</a>
                    <a href="timer.html" class="text-gray-500 hover:text-gray-900 font-medium transition duration-200">Timer</a>
                    <a href="about.html" class="text-gray-500 hover:text-gray-900 font-medium transition duration-200">About Us</a>
                </nav>

                <div class="flex items-center space-x-4">
                    <a href="log_in.html" class="text-gray-600 hover:text-primary font-medium transition duration-200 hidden sm:block">Log in</a>
                    <a href="register.html" class="bg-primary text-white font-medium px-4 py-2 rounded-lg hover:bg-primaryHover transition duration-200">Sign Up</a>
                </div>

            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center w-full p-4">
        
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md my-8">
            
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-800">Log in to Your Account</h1>
                <p class="text-gray-500 text-sm mt-2">Get access to your account</p>
            </div>

            <form action="#" method="POST">


                <div class="mb-4">
                    <label for="email" class="block text-gray-700 text-sm font-semibold mb-2">Email</label>
                    <input type="email" id="email" name="email" placeholder="anna_idolova@gmail.com" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition duration-200">
                </div>

                <div class="mb-6">
                    <label for="password" class="block text-gray-700 text-sm font-semibold mb-2">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition duration-200">
                </div>


                <a href="profile.html" class="w-full bg-primary text-white font-bold py-2 px-4 rounded-lg
                 hover:bg-primaryHover focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition duration-200">
                    Log In</a>    
            </form>
            <div class="text-center mt-6">
                <p class="text-sm text-gray-600">
                    Don't have an account? 
                    <a href="register.html" class="text-primary hover:underline font-semibold">Sign up here</a>
                </p>
            </div>

        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 w-full mt-auto">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center text-sm text-gray-500">
            <p>&copy; 2026 Time Tracker. All rights reserved.</p>
            <div class="mt-4 md:mt-0 space-x-6 flex">
                <a href="#" class="hover:text-primary transition duration-200">Terms of Service</a>
                <a href="#" class="hover:text-primary transition duration-200">Privacy Policy</a>
                <a href="#" class="hover:text-primary transition duration-200">Support</a>
            </div>
        </div>
    </footer>

</body>
</html>
