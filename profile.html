<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Time Tracker</title>
    <link href="./output.css" rel="stylesheet">
</head>
<cript style="background-image: url('/src/bg.jpg');" class="bg-cover bg-center bg-fixed bg-no-repeat flex flex-col min-h-screen text-gray-800">

<header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                
                <div class="flex items-center gap-2 cursor-pointer">
                    <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition duration-200">
                        <img src="timer.png" alt="TimeTracker" class="w-8 h-8 object-contain">
                        <span class="font-bold text-xl text-gray-900">TimeTracker</span>
                    </a>
                </div>

                <nav class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-900 font-bold transition duration-200">Main</a>
                    <a href="timer.html" class="text-gray-500 hover:text-gray-900 font-medium transition duration-200">Timer</a>
                    <a href="about.html" class="text-gray-500 hover:text-gray-900 font-medium transition duration-200">About Us</a>
                </nav>

                <div class="flex items-center space-x-4">
                    <a href="log_in.html" class="text-gray-600 hover:text-primary font-medium transition duration-200 hidden sm:block">Log in</a>
                    <a href="register.html" class="bg-primary text-white font-medium px-4 py-2 rounded-lg hover:bg-primaryHover transition duration-200">Sign Up</a>
                                       
                    <button id="menu-btn" class="md:hidden flex items-center p-2 focus:outline-none">
                        <img src="hamburger.png" alt="Open Menu" class="w-6 h-6 object-contain">
                    </button>
                </div>

            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-gray-200 absolute w-full left-0 shadow-lg">
            <div class="px-4 pt-2 pb-4 space-y-2">
                <a href="index.html" class="block px-3 py-2 text-gray-900 font-bold bg-gray-50 rounded-md">Main</a>
                <a href="timer.html" class="block px-3 py-2 text-gray-500 hover:text-gray-900 hover:bg-gray-100 rounded-md font-medium">Timer</a>
                <a href="about.html" class="block px-3 py-2 text-gray-500 hover:text-gray-900 hover:bg-gray-100 rounded-md font-medium">About Us</a>
                <a href="log_in.html" class="block px-3 py-2 text-gray-500 hover:text-gray-900 hover:bg-gray-100 rounded-md font-medium sm:hidden">Log in</a>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-4xl mx-auto">

            <div class="bg-white shadow-sm border border-gray-200 rounded-2xl overflow-hidden">
                
                <div class="bg-gray-50 px-6 py-8 border-b border-gray-200 flex items-center gap-6">
                    <div class="w-24 h-24 bg-gray-200 rounded-full border-4 border-white shadow-md flex items-center justify-center overflow-hidden flex-shrink-0">
                       
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold text-gray-900">Anna Idolova</h2>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <tbody>
                            <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                                <th class="py-4 px-6 font-medium text-gray-500 w-1/3 sm:w-1/4">Full Name</th>
                                <td class="py-4 px-6 text-gray-900 font-medium">Anna Idolova</td>
                            </tr>
                            <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                                <th class="py-4 px-6 font-medium text-gray-500">Email Address</th>
                                <td class="py-4 px-6 text-gray-900">anna.idolova@gmail.com</td>
                            </tr>
                            <tr class="hover:bg-gray-50 transition">
                                <th class="py-4 px-6 font-medium text-gray-500">Member Since</th>
                                <td class="py-4 px-6 text-gray-900">January 15, 2026</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>

        </div>
    </main>

    <footer class="bg-white w-full border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center text-sm text-gray-500">
            <p>&copy; 2026 Time Tracker. All rights reserved.</p>
            <div class="mt-4 md:mt-0 space-x-6 flex">
                <a href="#" class="hover:text-primary transition duration-200">Terms of Service</a>
                <a href="#" class="hover:text-primary transition duration-200">Privacy Policy</a>
                <a href="#" class="hover:text-primary transition duration-200">Support</a>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('menu-btn').addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
    </script>

</body>
</html>
